<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Polished white robot face icon</title>
  <desc>A minimal white circular robot mascot icon with transparent background and transparent cut-out eyes and mouth.</desc>

  <defs>
    <!-- Mask makes the eyes and mouth real transparent holes. -->
    <mask id="face-cutouts" maskUnits="userSpaceOnUse" x="0" y="0" width="512" height="512">
      <rect width="512" height="512" fill="black"/>
      <circle cx="256" cy="256" r="210" fill="white"/>

      <!-- Transparent eye openings -->
      <path d="M165 184 C230 176 283 246 252 319" stroke="black" stroke-width="36" stroke-linecap="round"/>
      <path d="M299 134 C385 151 428 233 385 309" stroke="black" stroke-width="36" stroke-linecap="round"/>

      <!-- Transparent mouth opening -->
      <path d="M319 344 C335 331 361 335 363 348 C365 361 341 373 323 367 C310 363 309 353 319 344Z" fill="black"/>
    </mask>

    <filter id="soft-polish" x="30" y="30" width="452" height="452" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Transparent background by default -->

  <!-- White robot face. Eyes and mouth are cut out through the mask. -->
  <g filter="url(#soft-polish)">
    <circle cx="256" cy="256" r="210" fill="#FFFFFF" mask="url(#face-cutouts)"/>
  </g>

  <!-- Subtle outer polish/edge so the white icon is still visible on light UIs. -->
  <circle cx="256" cy="256" r="210" stroke="#E5E7EB" stroke-width="8"/>
  <circle cx="214" cy="170" r="118" stroke="#FFFFFF" stroke-width="10" opacity="0.35"/>
</svg>
