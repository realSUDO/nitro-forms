services:
  postgresdb:
    image: postgres:15
    restart: unless-stopped
    container_name: postgresdb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8
    restart: unless-stopped
    container_name: valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data

volumes:
  pg_data:
  valkey_data:
